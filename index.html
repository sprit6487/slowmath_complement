<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>느린아이 보수 연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-50: #FDFCFA; --warm-100: #FAF7F2; --warm-200: #F3EDE4;
    --warm-300: #E0D5C5; --warm-400: #B8AD9E; --warm-500: #8C7E6A;
    --warm-600: #6B5F50; --warm-700: #4A4035; --warm-800: #2E261D;
    --border: #E8E2DA;
    --app-blue: #6BADE8; --app-blue-light: #D9EDFC; --app-blue-soft: #EEF6FD;
    --app-orange: #F0A050; --app-orange-light: #FDE8C8; --app-orange-soft: #FFF6EB;
    --app-green: #5BC886; --app-green-light: #D4F5E0;
    --app-red: #F07070; --app-red-light: #FDE8E8;
    --bg: #F5F1EB;
    --radius: 16px;
    --radius-lg: 32px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    color: var(--warm-700);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .hidden { display: none !important; }

  /* ===== Login View ===== */
  #login-view {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    flex: 1; min-height: 100dvh;
    padding: 40px 20px;
  }
  .login-logo-area {
    text-align: center;
    margin-bottom: 48px;
  }
  .login-logo-area .turtle-logo {
    font-size: 4rem;
    line-height: 1;
    margin-bottom: 4px;
  }
  .login-logo-area h1 {
    font-size: 1.875rem; font-weight: 900;
    letter-spacing: -0.025em;
    color: var(--warm-800);
    margin-top: 8px;
  }
  .login-subtitle {
    color: var(--warm-400);
    font-size: 0.9375rem; font-weight: 500;
    margin-top: 6px;
  }
  .login-buttons {
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .login-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    width: 100%; padding: 14px;
    border: none; border-radius: 12px;
    font-size: 0.9375rem; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:active { opacity: 0.8; }
  .login-btn.kakao { background: #FEE500; color: #191919; }
  .login-btn.naver { background: #03C75A; color: #fff; }
  .login-btn.google { background: #fff; color: #444; border: 1.5px solid #DADCE0; }
  .login-btn.facebook { background: #1877F2; color: #fff; }
  .login-divider {
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 320px;
    margin: 16px 0 4px;
    color: var(--warm-400);
    font-size: 0.8rem;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--warm-300);
  }
  .login-btn.guest {
    background: none; border: 1.5px solid var(--border);
    color: var(--warm-500); font-weight: 500;
  }

  /* ===== Start View ===== */
  #start-view {
    width: 100%; max-width: 480px;
    padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }
  .brand .turtle-icon { font-size: 2.2rem; }
  .brand h1 {
    font-size: 1.875rem; font-weight: 900;
    letter-spacing: -0.025em;
    color: var(--warm-800);
  }
  .brand-sub {
    font-size: 0.85rem; color: var(--warm-400);
    margin-bottom: 24px; font-weight: 500;
  }

  /* Mode Cards */
  .mode-card {
    background: #fff; border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 20px; width: 100%;
    margin-bottom: 14px; text-align: center;
    transition: transform 0.12s, box-shadow 0.12s;
    cursor: default;
  }
  .mode-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .mode-card:active { transform: scale(0.98); }
  .mode-card h2 {
    font-size: 1.1rem; font-weight: 700; color: var(--warm-700);
    margin-bottom: 4px;
  }
  .mode-card .desc {
    font-size: 0.8rem; color: var(--warm-400); margin-bottom: 16px;
  }
  .mode-card .mode-preview {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 16px; min-height: 36px; align-items: center;
  }
  .preview-dot {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--app-blue); opacity: 0.55;
  }
  .preview-dot.empty {
    background: none; border: 2.5px dashed var(--warm-300); opacity: 0.45;
  }
  .mode-btns {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .start-btn {
    padding: 11px 22px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #fff;
    font-size: 0.9rem; font-weight: 700;
    color: var(--warm-600);
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
  }
  .start-btn:hover, .start-btn:active {
    background: var(--app-blue-soft);
    border-color: var(--app-blue); color: var(--app-blue);
  }

  /* Settings Panel */
  .settings-panel {
    background: #fff; border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px; width: 100%;
    margin-bottom: 14px;
  }
  .settings-panel h3 {
    font-size: 0.9rem; font-weight: 700; color: var(--warm-500);
    margin-bottom: 14px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--warm-200);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label {
    font-size: 0.875rem; font-weight: 600; color: var(--warm-700);
  }
  .setting-label small {
    display: block; font-size: 0.75rem; font-weight: 400; color: var(--warm-400);
    margin-top: 2px;
  }

  /* Toggle */
  .toggle-track {
    width: 48px; height: 28px;
    border-radius: 99px;
    background: #E0DAD0; border: none;
    cursor: pointer; position: relative;
    transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-track.on { background: var(--app-green); }
  .toggle-knob {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; position: absolute;
    top: 3px; left: 3px;
    transition: left 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .toggle-track.on .toggle-knob { left: 23px; }

  /* Impulse details */
  .impulse-details {
    display: none; margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--warm-200);
  }
  .impulse-details.show { display: block; }
  .impulse-mode-btns {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .impulse-mode-btn {
    flex: 1; padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 12px; background: #fff;
    font-size: 0.85rem; font-weight: 600;
    color: var(--warm-500);
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
  }
  .impulse-mode-btn.active {
    border-color: var(--app-orange);
    background: var(--app-orange-soft);
    color: var(--app-orange);
  }
  .impulse-delay-row {
    display: none; flex-wrap: wrap; gap: 6px;
  }
  .impulse-delay-row.show { display: flex; }
  .imp-sec {
    padding: 7px 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px; background: #fff;
    font-size: 0.8rem; font-weight: 600;
    color: var(--warm-500);
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
  }
  .imp-sec.active {
    border-color: var(--app-orange);
    background: var(--app-orange-soft);
    color: var(--app-orange);
  }

  /* Logout */
  .logout-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.75rem; font-weight: 600;
    color: var(--warm-400);
    cursor: pointer; font-family: inherit;
    margin-top: 8px;
    transition: background 0.12s;
  }
  .logout-btn:hover { background: var(--warm-200); }

  /* ===== Play View ===== */
  #play-view {
    width: 100%; max-width: 480px;
    padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  .play-header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin-bottom: 16px;
  }
  .back-btn {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px; background: #fff;
    font-size: 0.8rem; font-weight: 600;
    color: var(--warm-500);
    cursor: pointer; font-family: inherit;
  }
  .play-title {
    font-size: 0.95rem; font-weight: 700; color: var(--warm-700);
  }
  .play-score {
    font-size: 0.85rem; font-weight: 700; color: var(--app-blue);
  }

  /* Game container */
  .game-container {
    background: #fff; border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 20px; width: 100%;
    min-height: 400px;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }

  /* Question */
  .question-label {
    font-size: 0.9rem; color: var(--warm-400); font-weight: 500;
    margin-bottom: 8px;
  }
  .question-number {
    font-size: 4.5rem; font-weight: 900; line-height: 1;
    color: var(--warm-800); margin-bottom: 8px;
  }

  /* Circles - 5 per row, 2 rows */
  .circles-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin: 12px 0 24px;
    width: 190px;
  }
  .dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--app-blue); opacity: 0.65;
  }
  .dot.empty {
    background: none; border: 2.5px dashed var(--warm-300); opacity: 0.45;
    width: 30px; height: 30px;
  }

  /* Choices */
  .choices-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; width: 100%; max-width: 300px;
    margin-top: auto;
  }
  .choice-btn {
    padding: 20px;
    border: 2.5px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    font-size: 2rem; font-weight: 900;
    color: var(--warm-700);
    cursor: pointer; font-family: inherit;
    transition: all 0.1s; text-align: center;
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.95); }
  .choice-btn.correct {
    border-color: var(--app-green); background: var(--app-green-light);
    color: var(--app-green); animation: popIn 0.35s ease;
  }
  .choice-btn.wrong {
    border-color: var(--app-red); background: var(--app-red-light);
    color: var(--app-red); animation: shake 0.4s ease;
  }
  .choice-btn:disabled { pointer-events: none; opacity: 0.4; }
  .choices-grid.chips-hidden .choice-btn { visibility: hidden; }
  .choices-grid.chips-locked .choice-btn { pointer-events: none; opacity: 0.4; }

  /* Reveal button */
  .reveal-btn {
    padding: 14px 32px;
    border: 1.5px solid var(--app-orange);
    border-radius: 12px;
    background: var(--app-orange-soft);
    font-size: 0.95rem; font-weight: 700;
    color: var(--app-orange);
    cursor: pointer; font-family: inherit;
    margin-top: 16px;
  }

  /* Impulse message */
  .impulse-msg {
    font-size: 1rem; font-weight: 600;
    color: var(--app-orange);
    margin-top: 12px; min-height: 24px;
    text-align: center;
    animation: pulse-count 1s ease infinite;
  }

  /* Pair mode */
  .pair-info {
    font-size: 0.95rem; font-weight: 600;
    color: var(--warm-500); margin-bottom: 16px;
    text-align: center;
  }
  .pair-info strong { color: var(--app-blue); }
  .pair-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; width: 100%; max-width: 340px;
  }
  .pair-grid.cols-5 { grid-template-columns: repeat(5, 1fr); max-width: 380px; }
  .pair-grid.cols-6 { grid-template-columns: repeat(6, 1fr); max-width: 420px; }
  .pair-cell {
    aspect-ratio: 1;
    border: 2.5px solid var(--border);
    border-radius: 14px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.75rem; font-weight: 900;
    color: var(--warm-700);
    cursor: pointer; font-family: inherit;
    transition: all 0.1s; position: relative;
  }
  .pair-grid.cols-5 .pair-cell { font-size: 1.4rem; border-width: 2px; }
  .pair-grid.cols-6 .pair-cell { font-size: 1.15rem; border-width: 2px; border-radius: 10px; }
  .pair-cell:active { transform: scale(0.95); }
  .pair-cell.selected {
    border-color: var(--app-blue); background: var(--app-blue-soft);
    color: var(--app-blue);
    box-shadow: 0 0 0 3px rgba(107,173,232,0.2);
  }
  .pair-cell.matched {
    border-color: var(--app-green); background: var(--app-green-light);
    color: var(--app-green);
    cursor: default; opacity: 0.6;
  }
  .pair-cell.matched::after {
    content: '\2713'; position: absolute;
    top: 2px; right: 5px; font-size: 0.7rem;
    color: var(--app-green); font-weight: 700;
  }
  .pair-cell.wrong-pair {
    border-color: var(--app-red); background: var(--app-red-light);
    color: var(--app-red); animation: shake 0.4s ease;
  }
  .pair-progress {
    font-size: 0.8rem; color: var(--warm-400);
    margin-top: 16px; font-weight: 500;
  }

  /* Complete overlay */
  .complete-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.95);
    border-radius: var(--radius-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; z-index: 10;
    backdrop-filter: blur(4px);
  }
  .complete-emoji { font-size: 56px; }
  .complete-msg { font-size: 1.25rem; font-weight: 900; color: var(--warm-800); }
  .complete-sub { font-size: 0.85rem; color: var(--warm-400); }
  .next-btn {
    margin-top: 8px; padding: 14px 36px;
    border: none; border-radius: 12px;
    background: var(--app-blue);
    color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: transform 0.12s;
  }
  .next-btn:active { transform: scale(0.96); }

  /* Combo badge */
  .combo-badge {
    font-size: 0.8rem; font-weight: 700;
    color: var(--app-orange); min-height: 20px;
  }

  /* Feedback */
  .feedback-float {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    font-size: 64px; z-index: 100;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .feedback-float.show {
    transform: translate(-50%,-50%) scale(1);
  }

  /* Animations */
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0.5; }
    45% { transform: scale(1.15); opacity: 1; }
    65% { transform: scale(0.92); }
    80% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes pulse-count {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.7; }
  }

  /* Wider game container for large grids */
  .game-container.wide { max-width: 520px; }

  /* Desktop */
  @media (min-width: 560px) {
    #login-view { max-width: 560px; }
    #start-view, #play-view {
      max-width: 560px; padding: 44px 40px;
    }
    body {
      justify-content: flex-start;
    }
    .question-number { font-size: 5.5rem; }
    .choice-btn { font-size: 2.5rem; }
    .pair-grid.cols-6 { max-width: 480px; }
  }
</style>
</head>
<body>

<!-- ===== Login View ===== -->
<div id="login-view">
  <div class="login-logo-area">
    <div class="turtle-logo">🐢</div>
    <h1>느린아이</h1>
    <p class="login-subtitle">더해서 10이 되는 수를 찾아보세요</p>
  </div>
  <div class="login-buttons">
    <button class="login-btn kakao" onclick="doLogin('kakao')">카카오 로그인</button>
    <button class="login-btn naver" onclick="doLogin('naver')">네이버 로그인</button>
    <button class="login-btn google" onclick="doLogin('google')">Google 로그인</button>
    <button class="login-btn facebook" onclick="doLogin('facebook')">Facebook 로그인</button>
  </div>
  <div class="login-divider">또는</div>
  <div class="login-buttons">
    <button class="login-btn guest" onclick="doLogin('guest')">게스트로 시작하기</button>
  </div>
</div>

<!-- ===== Start View ===== -->
<div id="start-view" class="hidden">
  <div class="brand">
    <span class="turtle-icon">🐢</span>
    <h1>느린아이</h1>
  </div>
  <p class="brand-sub">보수 연습</p>

  <!-- Mode 1: Quiz with circles -->
  <div class="mode-card">
    <h2>보수 찾기 (원 표시)</h2>
    <p class="desc">숫자와 원을 보고, 더해서 10이 되는 수를 골라요</p>
    <div class="mode-preview">
      <div class="preview-dot"></div><div class="preview-dot"></div><div class="preview-dot"></div>
      <div class="preview-dot empty"></div><div class="preview-dot empty"></div>
    </div>
    <div class="mode-btns">
      <button class="start-btn" onclick="startGame('quiz-circles')">시작하기</button>
    </div>
  </div>

  <!-- Mode 2: Quiz plain -->
  <div class="mode-card">
    <h2>보수 찾기</h2>
    <p class="desc">숫자만 보고, 더해서 10이 되는 수를 골라요</p>
    <div class="mode-preview" style="font-size:2rem;font-weight:900;color:var(--warm-600);">
      ? + ? = 10
    </div>
    <div class="mode-btns">
      <button class="start-btn" onclick="startGame('quiz-plain')">시작하기</button>
    </div>
  </div>

  <!-- Mode 3: Pair matching -->
  <div class="mode-card">
    <h2>짝 맞추기</h2>
    <p class="desc">더해서 10이 되는 두 수를 찾아 터치하세요</p>
    <div class="mode-preview" style="font-size:1.4rem;font-weight:700;color:var(--app-blue);">
      1&nbsp;&nbsp;9&nbsp;&nbsp;→&nbsp;&nbsp;10 ✓
    </div>
    <div class="mode-btns">
      <button class="start-btn" onclick="startGame('pair',10)">10개</button>
      <button class="start-btn" onclick="startGame('pair',20)">20개</button>
      <button class="start-btn" onclick="startGame('pair',30)">30개</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-panel">
    <h3>설정</h3>

    <div class="setting-row">
      <div class="setting-label">
        음성 읽기
        <small>문제와 결과를 소리로 읽어줘요</small>
      </div>
      <button class="toggle-track" id="tts-toggle" onclick="toggleTTS()">
        <div class="toggle-knob"></div>
      </button>
    </div>

    <div class="setting-row" style="flex-wrap:wrap;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <div class="setting-label">
          충동방지
          <small>바로 누르지 않고 생각할 시간을 줘요</small>
        </div>
        <button class="toggle-track" id="impulse-toggle" onclick="toggleImpulse()">
          <div class="toggle-knob"></div>
        </button>
      </div>
      <div class="impulse-details" id="impulse-details">
        <div class="impulse-mode-btns">
          <button class="impulse-mode-btn active" data-mode="hide" onclick="setImpulseMode('hide')">👀 보기 확인</button>
          <button class="impulse-mode-btn" data-mode="lock" onclick="setImpulseMode('lock')">🔒 선택 잠금</button>
        </div>
        <div class="impulse-delay-row" id="impulse-delay-row"></div>
      </div>
    </div>
  </div>

  <button class="logout-btn" onclick="doLogout()">로그아웃</button>
</div>

<!-- ===== Play View ===== -->
<div id="play-view" class="hidden">
  <div class="play-header">
    <button class="back-btn" onclick="goHome()">← 돌아가기</button>
    <span class="play-title" id="play-title"></span>
    <span class="play-score" id="play-score">0점</span>
  </div>
  <span class="combo-badge" id="combo-badge"></span>
  <div class="game-container" id="game-container"></div>
</div>

<div class="feedback-float" id="feedback"></div>

<script>
// ===== Constants =====
const STORAGE_KEY = 'slowmath_complement_settings';
const LOGIN_KEY = 'slowmath_complement_login';

// ===== State =====
let settings = loadSettings();
let currentMode = '';
let pairCount = 10;
let score = 0;
let combo = 0;
let questionNum = 0;
let locked = false;
let impulseTimer = null;

// ===== Login =====
function doLogin(provider) {
  localStorage.setItem(LOGIN_KEY, provider);
  showView('start');
}

function doLogout() {
  localStorage.removeItem(LOGIN_KEY);
  showView('login');
}

function checkLogin() {
  const provider = localStorage.getItem(LOGIN_KEY);
  if (provider) {
    showView('start');
  } else {
    showView('login');
  }
}

function showView(name) {
  document.getElementById('login-view').classList.toggle('hidden', name !== 'login');
  document.getElementById('start-view').classList.toggle('hidden', name !== 'start');
  document.getElementById('play-view').classList.toggle('hidden', name !== 'play');
  if (name === 'start') renderSettingsUI();
}

// ===== Settings =====
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return {
      tts: s?.tts ?? false,
      impulse: s?.impulse ?? false,
      impulseMode: s?.impulseMode ?? 'hide',
      impulseDelay: s?.impulseDelay ?? 3,
    };
  } catch { return { tts: false, impulse: false, impulseMode: 'hide', impulseDelay: 3 }; }
}

function saveSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function toggleTTS() {
  settings.tts = !settings.tts;
  saveSettings(); renderSettingsUI();
}

function toggleImpulse() {
  settings.impulse = !settings.impulse;
  saveSettings(); renderSettingsUI();
}

function setImpulseMode(mode) {
  settings.impulseMode = mode;
  saveSettings(); renderSettingsUI();
}

function setImpulseDelay(sec) {
  settings.impulseDelay = sec;
  saveSettings(); renderSettingsUI();
}

function renderSettingsUI() {
  const ttsEl = document.getElementById('tts-toggle');
  const impEl = document.getElementById('impulse-toggle');
  const detEl = document.getElementById('impulse-details');
  const delayRow = document.getElementById('impulse-delay-row');

  ttsEl.classList.toggle('on', settings.tts);
  impEl.classList.toggle('on', settings.impulse);
  detEl.classList.toggle('show', settings.impulse);

  document.querySelectorAll('.impulse-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === settings.impulseMode);
  });

  delayRow.classList.toggle('show', settings.impulseMode === 'lock');
  delayRow.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'imp-sec' + (settings.impulseDelay === i ? ' active' : '');
    btn.textContent = i + '초';
    btn.onclick = () => setImpulseDelay(i);
    delayRow.appendChild(btn);
  }
}

// ===== TTS =====
function speak(text) {
  if (!settings.tts || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.9;
  setTimeout(() => window.speechSynthesis.speak(u), 50);
}

// ===== Navigation =====
function goHome() {
  if (impulseTimer) { clearInterval(impulseTimer); impulseTimer = null; }
  showView('start');
}

function startGame(mode, count) {
  currentMode = mode;
  if (count) pairCount = count;
  score = 0; combo = 0; questionNum = 0;
  showView('play');

  const titles = {
    'quiz-circles': '보수 찾기 (원)',
    'quiz-plain': '보수 찾기',
    'pair': '짝 맞추기 (' + pairCount + '개)'
  };
  document.getElementById('play-title').textContent = titles[mode];
  updateScoreUI();

  if (mode.startsWith('quiz')) {
    nextQuiz();
  } else {
    startPair();
  }
}

function updateScoreUI() {
  document.getElementById('play-score').textContent = score + '점';
  document.getElementById('combo-badge').textContent = combo > 1 ? combo + '연속 정답!' : '';
}

// ===== Feedback =====
function showFeedback(emoji) {
  const el = document.getElementById('feedback');
  el.textContent = emoji;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

// ===== Helpers =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== Quiz Mode =====
function nextQuiz() {
  questionNum++;
  locked = false;
  if (impulseTimer) { clearInterval(impulseTimer); impulseTimer = null; }

  const num = Math.floor(Math.random() * 9) + 1;
  const answer = 10 - num;
  const showCircles = currentMode === 'quiz-circles';

  const wrongs = new Set();
  while (wrongs.size < 3) {
    const w = Math.floor(Math.random() * 9) + 1;
    if (w !== answer) wrongs.add(w);
  }
  const choices = shuffle([answer, ...wrongs]);

  const gc = document.getElementById('game-container');

  let circlesHTML = '';
  if (showCircles) {
    let dots = '';
    for (let i = 0; i < num; i++) dots += '<div class="dot"></div>';
    for (let i = num; i < 10; i++) dots += '<div class="dot empty"></div>';
    circlesHTML = `<div class="circles-row">${dots}</div>`;
  }

  gc.innerHTML = `
    <div class="question-label">이 수의 보수는? (문제 ${questionNum})</div>
    <div class="question-number">${num}</div>
    ${circlesHTML}
    <div class="choices-grid" id="choices-grid">
      ${choices.map(c => `<button class="choice-btn" data-val="${c}">${c}</button>`).join('')}
    </div>
    <div class="impulse-msg" id="impulse-msg"></div>
  `;

  speak(`${num}의 보수는 무엇일까요?`);

  const grid = document.getElementById('choices-grid');
  const msgEl = document.getElementById('impulse-msg');

  if (settings.impulse) {
    if (settings.impulseMode === 'hide') {
      grid.classList.add('chips-hidden');
      const revealBtn = document.createElement('button');
      revealBtn.className = 'reveal-btn';
      revealBtn.textContent = '👀 보기 확인';
      revealBtn.addEventListener('click', () => {
        grid.classList.remove('chips-hidden');
        revealBtn.remove();
      });
      grid.after(revealBtn);
    } else {
      grid.classList.add('chips-locked');
      grid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      let countdown = settings.impulseDelay;
      msgEl.textContent = `${countdown}초 동안 생각해 보세요`;
      impulseTimer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          msgEl.textContent = `${countdown}초 동안 생각해 보세요`;
        } else {
          clearInterval(impulseTimer); impulseTimer = null;
          msgEl.textContent = '';
          grid.classList.remove('chips-locked');
          grid.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
        }
      }, 1000);
    }
  }

  gc.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (locked) return;
      locked = true;
      const val = parseInt(btn.dataset.val);
      if (val === answer) {
        btn.classList.add('correct');
        combo++;
        score += 10 + (combo > 1 ? combo * 2 : 0);
        showFeedback('🎉');
        speak('정답이에요!');
        updateScoreUI();
        setTimeout(() => nextQuiz(), 900);
      } else {
        btn.classList.add('wrong');
        combo = 0;
        showFeedback('😢');
        speak('다시 해봐요.');
        gc.querySelectorAll('.choice-btn').forEach(b => {
          if (parseInt(b.dataset.val) === answer) b.classList.add('correct');
        });
        updateScoreUI();
        setTimeout(() => nextQuiz(), 1300);
      }
    });
  });
}

// ===== Pair Mode =====
function generatePairs(totalNumbers) {
  const allPairs = [[1,9],[2,8],[3,7],[4,6],[5,5]];
  const numPairs = totalNumbers / 2;
  const result = [];
  for (let i = 0; i < numPairs; i++) {
    result.push([...allPairs[i % allPairs.length]]);
  }
  return result;
}

function startPair() {
  locked = false;
  const pairs = generatePairs(pairCount);
  const numbers = shuffle(pairs.flat());

  let colsClass = '';
  if (pairCount === 20) colsClass = 'cols-5';
  else if (pairCount === 30) colsClass = 'cols-6';

  let selected = null;
  let matchedIndices = new Set();
  let matchCount = 0;
  const totalPairs = pairs.length;

  speak('더해서 10이 되는 두 수를 찾아주세요.');

  function render() {
    const gc = document.getElementById('game-container');
    gc.innerHTML = `
      <div class="pair-info">더해서 <strong>10</strong>이 되는 두 수를 골라주세요</div>
      <div class="pair-grid ${colsClass}">
        ${numbers.map((n, i) => {
          let cls = 'pair-cell';
          if (matchedIndices.has(i)) cls += ' matched';
          if (selected === i) cls += ' selected';
          return `<button class="${cls}" data-idx="${i}">${n}</button>`;
        }).join('')}
      </div>
      <div class="pair-progress">${matchCount} / ${totalPairs} 쌍 완료</div>
    `;

    if (matchCount === totalPairs) {
      speak('모두 찾았어요! 잘했어요!');
      setTimeout(() => {
        gc.innerHTML += `
          <div class="complete-overlay">
            <div class="complete-emoji">🏆</div>
            <div class="complete-msg">모두 찾았어요!</div>
            <div class="complete-sub">${score}점</div>
            <button class="next-btn" id="pair-next">다시 하기</button>
          </div>
        `;
        document.getElementById('pair-next').addEventListener('click', () => {
          score = 0; combo = 0;
          updateScoreUI();
          startPair();
        });
      }, 500);
      return;
    }

    gc.querySelectorAll('.pair-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const idx = parseInt(cell.dataset.idx);
        if (matchedIndices.has(idx) || locked) return;

        if (selected === null) {
          selected = idx;
          render();
        } else if (selected === idx) {
          selected = null;
          render();
        } else {
          const a = numbers[selected];
          const b = numbers[idx];
          if (a + b === 10) {
            matchedIndices.add(selected);
            matchedIndices.add(idx);
            matchCount++;
            combo++;
            score += 20 + (combo > 1 ? combo * 3 : 0);
            selected = null;
            showFeedback('✨');
            speak(`${a} 더하기 ${b}는 10. 정답이에요!`);
            updateScoreUI();
            render();
          } else {
            locked = true;
            combo = 0;
            cell.classList.add('wrong-pair');
            const prevCell = gc.querySelector(`[data-idx="${selected}"]`);
            if (prevCell) prevCell.classList.add('wrong-pair');
            showFeedback('🙅');
            speak('다시 해봐요.');
            updateScoreUI();
            setTimeout(() => {
              selected = null;
              locked = false;
              render();
            }, 600);
          }
        }
      });
    });
  }

  render();
}

// ===== Init =====
checkLogin();
</script>
</body>
</html>
